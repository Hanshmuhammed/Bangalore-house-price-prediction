<!-- Sidebar Navigation Include -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <div class="brand-icon">BH</div>
        <span class="brand-text">BangaloreHome</span>
    </div>

    <nav class="sidebar-nav">
        <a href="{% url 'price_prediction' %}"
            class="sidebar-link {% if active_page == 'predictor' %}active{% endif %}">
            <i class="fas fa-calculator"></i>
            <span>Predictor</span>
        </a>
        <a href="{% url 'dashboard' %}" class="sidebar-link {% if active_page == 'insights' %}active{% endif %}">
            <i class="fas fa-chart-line"></i>
            <span>Market Insights</span>
        </a>
        <a href="{% url 'emi_calculator' %}" class="sidebar-link {% if active_page == 'emi' %}active{% endif %}">
            <i class="fas fa-hand-holding-usd"></i>
            <span>EMI Calculator</span>
        </a>
        <a href="{% url 'compare_locations' %}" class="sidebar-link {% if active_page == 'compare' %}active{% endif %}">
            <i class="fas fa-balance-scale"></i>
            <span>Compare</span>
        </a>
        <a href="{% url 'recommendations' %}"
            class="sidebar-link {% if active_page == 'recommendations' %}active{% endif %}">
            <i class="fas fa-magic"></i>
            <span>Find My Home</span>
        </a>

        <a href="{% url 'history' %}" class="sidebar-link {% if active_page == 'history' %}active{% endif %}">
            <i class="fas fa-history"></i>
            <span>History</span>
        </a>
        <a href="{% url 'profile' %}" class="sidebar-link {% if active_page == 'profile' %}active{% endif %}">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <div class="sidebar-user">
            <div class="sidebar-avatar">{{ user.username.0|upper }}</div>
            <div class="sidebar-user-info">
                <span class="sidebar-username">{{ user.username|title }}</span>
                <span class="sidebar-role">Member</span>
            </div>
        </div>
        <a href="{% url 'logout' %}" class="sidebar-logout">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </div>
</div>

<button class="sidebar-toggle" id="sidebarToggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
    <i class="fas fa-bars"></i>
</button>
